[pytest]
# Pytest configuration for GeekBrain AI System tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers for different test types
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (require running services)
    l1: L1 (Simple RAG) tests
    l2: L2 (Multi-Source RAG) tests
    l3: L3 (Tool-Augmented RAG) tests
    l4: L4 (Memory-Enabled RAG) tests
    slow: Tests that take more than 5 seconds

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage options (if using pytest-cov)
# Uncomment to enable coverage reporting
# addopts = --cov=src --cov-report=html --cov-report=term

# Timeout for tests (requires pytest-timeout)
# Uncomment to enable test timeouts
# timeout = 30
